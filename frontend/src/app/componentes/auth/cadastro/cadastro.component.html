<section class="container form-login">
  <header class="header-login">
    <h2>Crie sua conta</h2>
    <p>Cadastre nome, e-mail e senha para acessar a Memoteca.</p>
  </header>

  <form (ngSubmit)="cadastrar()">
    <div class="input-container">
      <label for="nome">Nome</label>
      <input
        type="text"
        class="input"
        id="nome"
        name="nome"
        placeholder="Digite seu nome"
        [(ngModel)]="nome"
        required
      >
    </div>

    <div class="input-container">
      <label for="email">E-mail</label>
      <input
        type="email"
        class="input"
        id="email"
        name="email"
        placeholder="Digite seu e-mail"
        [(ngModel)]="email"
        required
      >
    </div>

    <div class="input-container">
      <label for="senha">Senha</label>
      <input
        type="password"
        class="input"
        id="senha"
        name="senha"
        placeholder="Digite sua senha"
        [(ngModel)]="senha"
        required
      >
    </div>

    <div class="acoes">
      <button class="botao" type="submit">Cadastrar</button>
      <button class="botao botao-cancelar" type="button" routerLink="/login">Voltar</button>
    </div>
  </form>

  <p class="erro" *ngIf="erro">{{ erro }}</p>
</section>
